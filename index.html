    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',

                        heading: ['Oswald', 'sans-serif'],

                        'glow': 'glow 2s ease-in-out infinite'

                        pulseGold: {
                            '0%, 100%': { boxShadow: '0 0 10px #D4AF37' },
                            '50%': { boxShadow: '0 0 25px #D4AF37' },

        .punishment-option {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .punishment-option:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #D4AF37;
        }
        .punishment-option.selected {
            background: rgba(212, 175, 55, 0.15);
            border-color: #D4AF37;
        }
        .fire-icon {
            animation: pulseGold 1.5s infinite;
        }

        ::-webkit-scrollbar-track { background: #0A0A0A; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        .participant-card {
            transition: all 0.3s ease;

        }

        }
        .tipo-card.selected {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.1);
        }
    </style>
</head>

        // --- FIREBASE ---
        let db = null;
        let auth = null;
        let currentUser = null;
        
        async function initFirebase() {
            try {
                const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                if (!firebaseConfigStr) {
                    console.warn("Entorno local. Firebase no conectado.");
                    return;
                }
                const firebaseConfig = JSON.parse(firebaseConfigStr);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                const userCredential = await signInAnonymously(auth);
                currentUser = userCredential.user;
                console.log("Conectado a Infit Cloud");
            } catch (error) {
                console.error("Error inicializando Firebase:", error);
            }
        }

        // --- CORE LOGIC ---
        function calculateGoal(weight, height, plan) {
            if(!weight || !height) return "Completar 30 días del plan sin fallar (100% Adherencia).";
            
            let w = parseFloat(weight);
            let h = parseFloat(height);
            
            const bmi = w / ((h / 100) * (h / 100));
            
            if (plan === 'Alimentación') {
                if (bmi > 25) {
                    const objetivoPerdida = (w * 0.03).toFixed(1);
                    return `Bajar ${objetivoPerdida} kg con 100% adherencia al plan nutricional.`;
                } else if (bmi > 18.5) {
                    return "Mantener peso ideal con 100% adherencia al plan nutricional.";
                } else {
                    const objetivoGanancia = (w * 0.02).toFixed(1);
                    return `Ganar ${objetivoGanancia} kg con 100% adherencia al plan nutricional.`;
                }
            } 
            else if (plan === 'Entrenamiento') {
                if (bmi > 25) {
                    const objetivoPerdida = (w * 0.03).toFixed(1);
                    return `Bajar ${objetivoPerdida} kg cumpliendo 100% de los entrenamientos.`;
                } else if (bmi > 18.5) {
                    return "Tonificar músculos cumpliendo 100% de los entrenamientos.";
                } else {
                    return "Ganar masa muscular cumpliendo 100% de los entrenamientos.";
                }
            } 
            else if (plan === 'Combo VIP') {
                if (bmi > 25) {
                    const objetivoPerdida = (w * 0.04).toFixed(1);
                    return `Bajar ${objetivoPerdida} kg con dieta + ejercicio al 100%.`;
                } else if (bmi > 18.5) {
                    return "Tonificar y mejorar condición con 100% adherencia total.";
                } else {
                    return "Ganar masa muscular con dieta + entrenamiento al 100%.";
                }
            }
            
            return "Completar 30 días del plan sin fallar (100% Adherencia).";
        }

        function getAvatarFallbackCanvas(nombre) {
            const canvas = document.createElement('canvas');
            canvas.width = 200; 
            canvas.height = 200;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#1A1A1A';
            ctx.fillRect(0, 0, 200, 200);
            
            const initial = nombre ? nombre.charAt(0).toUpperCase() : 'X';
            ctx.fillStyle = '#D4AF37';
            ctx.font = 'bold 100px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(initial, 100, 110);
            
            return canvas.toDataURL('image/png');
        }

        window.previewImage = function(input, imgId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

                window.renderPlanSelection();
            }

        window.saveCurrentParticipant = function() {
            const idx = window.currentParticipantIndex;
            const nombre = document.getElementById('part-nombre')?.value || '';
            const genero = document.getElementById('part-genero')?.value || 'M';
            const peso = document.getElementById('part-peso')?.value || '';
            const estatura = document.getElementById('part-estatura')?.value || '';
            
            const imgPreview = document.getElementById('preview-part');
            let fotoBase64 = null;
            if (imgPreview && !imgPreview.classList.contains('hidden') && imgPreview.src) {
                fotoBase64 = imgPreview.src;
            }

            window.appState.participantes[idx] = { 
                nombre, 
                genero, 
                peso, 
                estatura, 
                foto: fotoBase64,
                rol: idx === 0 ? 'retador' : 'retado'
            };
        };

        window.saveParticipantAndNext = function() {
            const nombre = document.getElementById('part-nombre')?.value || '';
            const peso = document.getElementById('part-peso')?.value || '';
            const estatura = document.getElementById('part-estatura')?.value || '';
            
            if(!nombre || !peso || !estatura) {
                Swal.fire({icon: 'error', title: 'Faltan datos', text: 'Por favor completa todos los campos.', background: '#1a1a1a', color: '#fff'});
                return;
            }

            saveCurrentParticipant();
            
            const num = window.appState.numParticipantes;
            if (window.currentParticipantIndex < num - 1) {
                window.currentParticipantIndex++;
                renderSingleParticipantForm();
            } else {
                // Calcular metas para todos
                const plan = window.appState.plan;
                window.appState.metas = window.appState.participantes.map(p => 
                    calculateGoal(p.peso, p.estatura, plan)

                if (circle) {
                    circle.innerHTML = '';
                    circle.classList.remove('border-gold', 'bg-gold');
                    circle.classList.add('border-gray-500');

            if (index === 'custom') {
                document.getElementById('custom-container').classList.remove('hidden');
                document.getElementById('finalize-btn').classList.remove('hidden');
                window.appState.castigo.descripcion = '';
            } else {
                document.getElementById('custom-container').classList.add('hidden');

                        circle.classList.add('border-gold', 'bg-gold');

            const customContainer = document.getElementById('custom-container');
            const customTextarea = document.getElementById('castigo-custom');
            
            if (!castigoDesc || (customContainer && !customContainer.classList.contains('hidden'))) {
                if (customTextarea && customTextarea.value) {
                    castigoDesc = customTextarea.value;
                }
            }
            
            if(!castigoDesc) {
                Swal.fire({icon: 'warning', title: '¡Define el castigo!', text: 'Selecciona o escribe un castigo para el perdedor.', background: '#1a1a1a', color: '#fff'});

            window.appState.castigo.descripcion = castigoDesc;

            Swal.fire({
                title: 'Forjando el Reto...',
                html: '<p class="text-gray-400">Preparando tu desafío épico</p>',
                background: '#1a1a1a',
                color: '#D4AF37',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                if (db && currentUser) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'infit-local';
                    const retosRef = collection(db, 'artifacts', appId, 'public', 'data', 'retos_mx');

                        creadoEn: serverTimestamp(),
                        userId: currentUser.uid,
                        estado: 'pendiente'
                    });

                console.error("Error guardando en Firebase:", error);

            Swal.close();
            window.renderVSScreen();
        };

                        </h4>
                        <p class="pot-display text-3xl font-bold text-center">$${premioTotal} MXN</p>
                        <p class="text-[10px] text-gray-400 text-center mt-1">Acumulado: ${num} participantes × $${window.appState.premio.cantidad}</p>
                    </div>
                `;
            } else {
                retoSectionHtml = `
                    <div class="px-4 py-3 border-t border-white/10 bg-red-900/20">
                        <h4 class="text-red-400 text-xs font-bold uppercase mb-2 flex items-center justify-center">
                            <i class="fas fa-fire-flame-curved mr-1"></i> Castigo para el Perdedor
                        </h4>
                        <p class="text-white text-sm text-center">${window.appState.castigo.descripcion}</p>
                    </div>
                `;
            }

            container.innerHTML = `
                <div id="vs-card" class="glass-panel rounded-2xl overflow-hidden animate-fade-in">
                    <div class="bg-gradient-to-r from-gold/20 via-gold/10 to-transparent p-4 text-center border-b border-gold/20">
                        <div class="inline-flex items-center gap-2 bg-gold/10 border border-gold/30 px-3 py-1 rounded-full mb-2">
                            <i class="fas fa-fire text-gold text-xs"></i>
                            <span class="text-gold font-bold text-xs uppercase">¡Reto Creado!</span>
                        </div>
                        <h2 class="font-heading text-lg text-white uppercase tracking-wide">${window.appState.plan}</h2>
                        <p class="text-xs text-gray-400">30 Días de Transformación</p>
                    </div>

                    <div class="p-4 bg-black/30">
                        ${participantesHtml}
                    </div>

                    <div class="px-4 py-3 border-t border-white/10 bg-black/20">
                        <h4 class="text-gold text-xs font-bold uppercase mb-2 flex items-center justify-center">
                            <i class="fas fa-bullseye mr-1"></i> Metas (${window.appState.plan})
                        </h4>
                        <div class="grid grid-cols-2 gap-2 text-[10px]">
                            ${participantes.map((p, i) => `
                                <div class="bg-black/30 p-2 rounded-lg text-center ${i === 0 ? 'border border-gold/20' : ''}">
                                    <p class="text-gold truncate">${p.nombre} ${i === 0 ? '(R)' : ''}</p>
                                    <p class="text-white">${window.appState.metas[i]}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    ${retoSectionHtml}

                    <div class="px-4 py-3 bg-black/30 text-center border-t border-white/10">
                        <p class="text-gray-400 text-[10px]">Inicio: ${new Date().toLocaleDateString('es-MX', {day: 'numeric', month: 'short', year: 'numeric'})}</p>
                        <p class="text-gold text-xs font-bold">Finaliza en 30 días</p>
                    </div>

                    <div class="p-4 space-y-2">
                        <button onclick="shareToWhatsApp()" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl flex items-center justify-center gap-2 transition-all font-bold">
                            <i class="fab fa-whatsapp text-xl"></i> Compartir por WhatsApp
                        </button>
                        <button onclick="downloadImage()" class="w-full bg-gold/10 hover:bg-gold/20 border border-gold/30 text-gold py-3 rounded-xl flex items-center justify-center gap-2 transition-all font-bold">
                            <i class="fas fa-download"></i> Descargar Imagen
                        </button>
                        <button onclick="renderHome()" class="w-full text-gray-400 hover:text-white py-2 text-sm transition-colors">
                            <i class="fas fa-plus mr-1"></i> Crear otro reto
                        </button>
                    </div>
                </div>
            `;
        };

        window.shareToWhatsApp = function() {
            const participantes = window.appState.participantes;
            const num = window.appState.numParticipantes;
            const tipoReto = window.appState.tipoReto;
            
            let retoTexto = '';
            if (tipoReto === 'premio') {
                const premioTotal = window.appState.premio.cantidad * num;
                retoTexto = `💰 Premio: $${premioTotal} MXN (${num} × $${window.appState.premio.cantidad})`;
            } else {
                retoTexto = `💀 Castigo: ${window.appState.castigo.descripcion}`;
            }
            
            const retador = participantes[0];
            const retados = participantes.slice(1).map(p => p.nombre).join(', ');
            
            const mensaje = `🔥 *¡RETO INFIT CREADO!* 🔥

📋 Plan: ${window.appState.plan}
👤 Retador: ${retador.nombre}
🎯 Retados: ${retados}

🏁 Metas:
${participantes.map((p, i) => `• ${p.nombre}: ${window.appState.metas[i]}`).join('\n')}

${retoTexto}

⏰ ¡30 días para demostrar quién es el mejor!
💪 *Tu Mejor Versión - INFIT*`;

            const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        };

        window.downloadImage = async function() {
            const card = document.getElementById('vs-card');
            if (!card) return;
            
            Swal.fire({
                title: 'Generando imagen...',
                background: '#1a1a1a',
                color: '#fff',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const canvas = await html2canvas(card, {
                    backgroundColor: '#0A0A0A',
                    scale: 2,
                    useCORS: true
                });
                
                const link = document.createElement('a');
                const nombres = window.appState.participantes.map(p => p.nombre).join('_');
                link.download = `INFIT_Reto_${nombres}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                Swal.fire({
                    icon: 'success',
                    title: '¡Imagen descargada!',
                    background: '#1a1a1a',
                    color: '#fff',
                    timer: 1500,
                    showConfirmButton: false
                });
            } catch (error) {
                console.error('Error generando imagen:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Error al generar imagen',
                    background: '#1a1a1a',
                    color: '#fff'
                });
            }
        };

        window.openAdmin = function() {
            Swal.fire({
                title: 'Panel de Administrador',
                html: `
                    <input type="password" id="admin-password" class="swal2-input" placeholder="Contraseña" style="background:#1a1a1a;color:#fff;border:1px solid #D4AF37;">
                `,
                background: '#1a1a1a',
                color: '#fff',
                confirmButtonText: 'Acceder',
                confirmButtonColor: '#D4AF37',
                showCancelButton: true,
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    const pass = document.getElementById('admin-password').value;
                    if (pass === 'INFIT2026PRO') {
                        return true;
                    } else {
                        Swal.showValidationMessage('Contraseña incorrecta');
                        return false;
                    }
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    window.renderAdminPanel();
                }
            });
        };

        window.renderAdminPanel = function() {
            container.innerHTML = `
                <div class="glass-panel rounded-2xl p-6 animate-fade-in">
                    <button onclick="renderHome()" class="text-gray-400 mb-4 hover:text-white"><i class="fas fa-arrow-left mr-2"></i> Volver</button>
                    <h2 class="font-heading text-xl mb-4 text-white uppercase border-b border-white/10 pb-2">
                        <i class="fas fa-cog text-gold mr-2"></i>Panel Admin
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs text-gray-400 uppercase">Plan Alimentación ($MXN)</label>
                            <input type="number" id="admin-plan-ali" class="w-full input-infit rounded-lg p-3 mt-1" value="${window.prices.plan_alimentacion}">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 uppercase">Plan Entrenamiento ($MXN)</label>
                            <input type="number" id="admin-plan-ent" class="w-full input-infit rounded-lg p-3 mt-1" value="${window.prices.plan_entrenamiento}">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 uppercase">Combo VIP ($MXN)</label>
                            <input type="number" id="admin-combo" class="w-full input-infit rounded-lg p-3 mt-1" value="${window.prices.combo}">
                        </div>
                    </div>

                    <div class="mt-6 pt-4 border-t border-white/10">
                        <p class="text-xs text-gray-400 mb-3">Descuentos por participantes (%)</p>
                        <div class="grid grid-cols-3 gap-2">
                            <div>
                                <label class="text-[10px] text-gray-500">2 pers.</label>
                                <input type="number" id="admin-desc-2" class="w-full input-infit rounded-lg p-2 mt-1 text-sm text-center" value="${window.descuentosPorParticipante[2]}">
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-500">3 pers.</label>
                                <input type="number" id="admin-desc-3" class="w-full input-infit rounded-lg p-2 mt-1 text-sm text-center" value="${window.descuentosPorParticipante[3]}">
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-500">4 pers.</label>
                                <input type="number" id="admin-desc-4" class="w-full input-infit rounded-lg p-2 mt-1 text-sm text-center" value="${window.descuentosPorParticipante[4]}">
                            </div>
                        </div>
                    </div>
                    
                    <button onclick="saveAdminSettings()" class="btn-gold w-full py-3 rounded-xl mt-6 font-heading">
                        Guardar Cambios
                    </button>
                </div>
            `;
        };

        window.saveAdminSettings = function() {
            window.prices = {
                plan_alimentacion: parseInt(document.getElementById('admin-plan-ali').value) || 600,
                plan_entrenamiento: parseInt(document.getElementById('admin-plan-ent').value) || 600,
                combo: parseInt(document.getElementById('admin-combo').value) || 1000,
                descuento_2: parseInt(document.getElementById('admin-desc-2').value) || 10,
                descuento_3: parseInt(document.getElementById('admin-desc-3').value) || 15,
                descuento_4: parseInt(document.getElementById('admin-desc-4').value) || 20
            };
            
            window.descuentosPorParticipante = {
                2: window.prices.descuento_2,
                3: window.prices.descuento_3,
                4: window.prices.descuento_4
            };
            
            localStorage.setItem('infit_prices_mx', JSON.stringify(window.prices));
            
            Swal.fire({
                icon: 'success',
                title: '¡Guardado!',
                text: 'Los precios se actualizaron correctamente.',
                background: '#1a1a1a',
                color: '#fff',
                timer: 1500,
                showConfirmButton: false
            });
        };

        // --- INIT ---
        initFirebase();
        window.renderHome();
    </script>
</body>
</html>
